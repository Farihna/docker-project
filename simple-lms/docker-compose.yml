services:

  web:
    image: kaqfa/be_simple_lms-django
    container_name: lms-app
    command: sh -c "pip install -r /code/requirements.txt -q && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./code:/code
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_HOST=database
      - DB_NAME=lms_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URI=mongodb://mongodb:27017/
      - MONGODB_DB=lms_logs
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_HOST_USER=your_email@gmail.com
      - EMAIL_HOST_PASSWORD=your_app_password
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  database:
    image: postgres:16
    container_name: lms-db
    environment:
      - POSTGRES_DB=lms_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: lms-mongodb
    environment:
      - MONGO_INITDB_DATABASE=lms_logs
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    image: kaqfa/be_simple_lms-django
    container_name: lms-celery-worker
    command: sh -c "pip install -r /code/requirements.txt -q && celery -A lms worker --loglevel=info --concurrency=4"
    volumes:
      - ./code:/code
    environment:
      - DB_HOST=database
      - DB_NAME=lms_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URI=mongodb://mongodb:27017/
      - MONGODB_DB=lms_logs
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_HOST_USER=your_email@gmail.com
      - EMAIL_HOST_PASSWORD=your_app_password
      - EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery-beat:
    image: kaqfa/be_simple_lms-django
    container_name: lms-celery-beat
    command: sh -c "pip install -r /code/requirements.txt -q && celery -A lms beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    volumes:
      - ./code:/code
    environment:
      - DB_HOST=database
      - DB_NAME=lms_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  flower:
    image: mher/flower
    container_name: lms-flower
    command: celery --broker=amqp://guest:guest@rabbitmq:5672// flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  mongo_data:
  rabbitmq_data: